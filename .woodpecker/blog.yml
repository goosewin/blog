clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 50

steps:
  critical:
    image: goosewin-blog-ci:bun-1.3.14-jq-curl
    pull: false
    environment:
      CI: 'true'
      SITE_URL: https://goose.dev
      VITE_PUBLIC_BASE_URL: https://goose.dev
    commands:
      - bun install --frozen-lockfile
      - bun run lint
      - bun run format:check
      - bun run typecheck
      - bun run test
      - bun run build
    when:
      - event: [pull_request, push, manual]

  newsletter:
    image: goosewin-blog-ci:bun-1.3.14-jq-curl
    pull: false
    environment:
      SITE_URL:
        from_secret: site_url
      NEWSLETTER_SECRET:
        from_secret: newsletter_secret
      NEWSLETTER_DRY_RUN: 'false'
    commands:
      - bun run newsletter
    when:
      - event: push
        branch: main
        path: 'posts/*.mdx'
